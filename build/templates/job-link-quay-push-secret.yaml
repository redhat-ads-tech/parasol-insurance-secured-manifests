# The "pipeline" SA is created by the Pipelines operator and owned by
# TektonConfig. Tekton Chains uses the TaskRun's SA (pipeline) to
# authenticate to the OCI registry when pushing signatures and attestations.
# We add quay-push-secret as an imagePullSecret so Chains can push to Quay.
# This must be a Job rather than a declarative SA resource because:
#   1. The pipeline SA may not exist yet when Argo first syncs (race with operator)
#   2. The operator owns the SA and could overwrite the "secrets" field,
#      but does not reconcile "imagePullSecrets"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: link-quay-push-secret
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: parasol-insurance-secured-build
      containers:
        - name: link-secret
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              NAMESPACE="{{ .Values.namespace }}"

              # Wait for the pipeline SA to be created by the operator
              echo "Waiting for pipeline SA..."
              until oc get sa pipeline -n "$NAMESPACE" > /dev/null 2>&1; do
                echo "pipeline SA not found, retrying in 5s..."
                sleep 5
              done
              echo "pipeline SA exists"

              # Wait for quay-push-secret to be created by ExternalSecret
              echo "Waiting for quay-push-secret..."
              until oc get secret quay-push-secret -n "$NAMESPACE" > /dev/null 2>&1; do
                echo "quay-push-secret not found, retrying in 5s..."
                sleep 5
              done
              echo "quay-push-secret exists"

              # Check if already linked
              EXISTING=$(oc get sa pipeline -n "$NAMESPACE" -o jsonpath='{.imagePullSecrets}' 2>/dev/null)
              if echo "$EXISTING" | grep -q "quay-push-secret"; then
                echo "quay-push-secret already linked to pipeline SA, no changes needed"
                exit 0
              fi

              # Patch imagePullSecrets to add quay-push-secret
              echo "Linking quay-push-secret to pipeline SA..."
              oc patch sa pipeline -n "$NAMESPACE" --type json \
                -p '[{"op":"add","path":"/imagePullSecrets/-","value":{"name":"quay-push-secret"}}]'

              echo "quay-push-secret linked to pipeline SA successfully"
