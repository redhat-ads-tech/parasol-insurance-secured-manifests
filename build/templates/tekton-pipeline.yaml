apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: parasol-insurance-secured-tag-promote
  namespace: {{ .Values.namespace }}
spec:
  params:
    - name: git-tag
      type: string
    - name: git-revision
      type: string
    - name: tagger-email
      type: string
  workspaces:
    - name: source
    - name: basic-auth
    - name: dockerconfig
    - name: maven-cache
  tasks:
    - name: clone-source
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: "https://{{ .Values.gitlab.host }}/parasol/parasol-insurance.git"
        - name: REVISION
          value: $(params.git-revision)
        - name: SSL_VERIFY
          value: "false"
      workspaces:
        - name: output
          workspace: source
        - name: basic-auth
          workspace: basic-auth
    - name: maven-build
      runAfter:
        - clone-source
      taskRef:
        name: maven-build-secured
      workspaces:
        - name: source
          workspace: source
        - name: maven-cache
          workspace: maven-cache
    - name: build-tagged-image
      runAfter:
        - maven-build
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: "{{ .Values.registry.host }}/{{ .Values.registry.organization }}/{{ .Values.image.name }}:$(params.git-tag)"
        - name: DOCKERFILE
          value: Containerfile
        - name: TLSVERIFY
          value: "false"
        - name: STORAGE_DRIVER
          value: vfs
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: dockerconfig
    - name: acs-image-scan
      runAfter:
        - build-tagged-image
      taskRef:
        name: acs-image-scan-secured
      params:
        - name: IMAGE
          value: "{{ .Values.registry.host }}/{{ .Values.registry.organization }}/{{ .Values.image.name }}:$(params.git-tag)"
    - name: acs-image-check
      runAfter:
        - build-tagged-image
      taskRef:
        name: acs-image-check-secured
      params:
        - name: IMAGE
          value: "{{ .Values.registry.host }}/{{ .Values.registry.organization }}/{{ .Values.image.name }}:$(params.git-tag)"
    - name: generate-sbom
      runAfter:
        - acs-image-scan
        - acs-image-check
      taskRef:
        name: generate-sbom-secured
      params:
        - name: IMAGE
          value: "{{ .Values.registry.host }}/{{ .Values.registry.organization }}/{{ .Values.image.name }}:$(params.git-tag)"
        - name: SOURCE_NAME
          value: "parasol-insurance-secured"
        - name: SOURCE_VERSION
          value: $(params.git-tag)
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: dockerconfig
    - name: upload-sbom-to-tpa
      runAfter:
        - generate-sbom
      taskRef:
        name: upload-sbom-to-tpa-secured
      params:
        - name: LABEL_DEV
          value: $(params.tagger-email)
        - name: LABEL_COMPONENT
          value: "parasol-insurance-secured"
      workspaces:
        - name: source
          workspace: source
    - name: trigger-validation
      runAfter:
        - upload-sbom-to-tpa
      taskRef:
        name: trigger-validation-secured
      params:
        - name: IMAGE
          value: "{{ .Values.registry.host }}/{{ .Values.registry.organization }}/{{ .Values.image.name }}@$(tasks.build-tagged-image.results.IMAGE_DIGEST)"
        - name: GIT_TAG
          value: $(params.git-tag)
