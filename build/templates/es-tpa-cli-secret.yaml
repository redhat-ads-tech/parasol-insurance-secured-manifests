apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tpa-cli-secret
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: tpa-cli-secret
    creationPolicy: Owner
    template:
      data:
        client_id: tpa-cli
        client_secret: "{{`{{ .client_secret }}`}}"
  data:
    - secretKey: client_secret
      remoteRef:
        key: secrets/tpa/cli-client-secret
        property: value
