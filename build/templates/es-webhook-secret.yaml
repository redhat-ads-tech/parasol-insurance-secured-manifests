apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-webhook-secret
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: gitlab-webhook-secret
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: secrets/parasol-insurance-secured/webhook-secret
        property: value
