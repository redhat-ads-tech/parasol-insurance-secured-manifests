apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build-secured
  namespace: {{ .Values.namespace }}
spec:
  workspaces:
    - name: source
    - name: maven-cache
      optional: true
  steps:
    - name: maven-build
      image: registry.access.redhat.com/ubi9/openjdk-21:1.20
      workingDir: $(workspaces.source.path)
      env:
        - name: MAVEN_OPTS
          value: "-Dmaven.repo.local=$(workspaces.maven-cache.path)/.m2/repository"
      script: |
        #!/usr/bin/env bash
        set -ex
        mvn package
