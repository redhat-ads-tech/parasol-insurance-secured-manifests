apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: acs-api-token
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: acs-api-token
    creationPolicy: Owner
  data:
    - secretKey: rox_api_token
      remoteRef:
        key: secrets/acs/api-token
        property: value
