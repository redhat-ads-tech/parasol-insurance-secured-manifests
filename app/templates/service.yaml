apiVersion: v1
kind: Service
metadata:
  name: parasol-insurance-secured
  namespace: {{ .Values.namespace }}
  labels:
    app: parasol-insurance-secured
    app.kubernetes.io/name: parasol-insurance-secured
    app.kubernetes.io/part-of: parasol-insurance-secured-{{ .Values.environment }}
    app.openshift.io/runtime: quarkus
spec:
  selector:
    app: parasol-insurance-secured
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
